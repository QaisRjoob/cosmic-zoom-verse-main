<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <!-- Planet gradient: violet core → deep indigo edge -->
    <radialGradient id="pg" cx="38%" cy="32%" r="68%">
      <stop offset="0%"   stop-color="#c4b5fd"/>
      <stop offset="40%"  stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </radialGradient>
    <!-- Soft glow halo behind planet -->
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#7c3aed" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <!-- Ring gradient: cyan ↔ purple -->
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#06b6d4" stop-opacity="0.15"/>
      <stop offset="25%"  stop-color="#06b6d4" stop-opacity="1"/>
      <stop offset="55%"  stop-color="#a78bfa" stop-opacity="1"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.1"/>
    </linearGradient>
    <!-- Clip to split ring behind/in-front of planet -->
    <clipPath id="above"><rect x="0" y="0"  width="32" height="16"/></clipPath>
    <clipPath id="below"><rect x="0" y="16" width="32" height="16"/></clipPath>
  </defs>

  <!-- Dark rounded background -->
  <rect width="32" height="32" rx="7" fill="#06060f"/>

  <!-- Distant stars -->
  <circle cx="4"  cy="4"  r="0.65" fill="white"   opacity="0.90"/>
  <circle cx="27" cy="6"  r="0.50" fill="white"   opacity="0.70"/>
  <circle cx="29" cy="22" r="0.55" fill="#a78bfa" opacity="0.85"/>
  <circle cx="5"  cy="26" r="0.45" fill="white"   opacity="0.65"/>
  <circle cx="25" cy="28" r="0.50" fill="#06b6d4" opacity="0.80"/>
  <circle cx="3"  cy="14" r="0.40" fill="white"   opacity="0.50"/>
  <circle cx="28" cy="14" r="0.40" fill="white"   opacity="0.55"/>
  <circle cx="13" cy="2"  r="0.35" fill="#c4b5fd" opacity="0.70"/>

  <!-- Glow halo -->
  <circle cx="16" cy="16" r="11" fill="url(#halo)"/>

  <!-- Ring segment: behind planet (lower half) -->
  <ellipse cx="16" cy="16.5" rx="13.5" ry="3.2"
    fill="none" stroke="url(#ring)" stroke-width="2"
    clip-path="url(#below)" transform="rotate(-18 16 16)"/>

  <!-- Planet body -->
  <circle cx="16" cy="16" r="7.5" fill="url(#pg)"/>

  <!-- Subtle surface band -->
  <ellipse cx="16" cy="17.5" rx="7.4" ry="2.2"
    fill="#4c1d95" opacity="0.30" transform="rotate(-8 16 17.5)"/>

  <!-- Specular highlight -->
  <ellipse cx="13.2" cy="12.5" rx="2.8" ry="1.4"
    fill="white" opacity="0.13" transform="rotate(-22 13.2 12.5)"/>

  <!-- Ring segment: in front of planet (upper half) -->
  <ellipse cx="16" cy="16.5" rx="13.5" ry="3.2"
    fill="none" stroke="url(#ring)" stroke-width="2"
    clip-path="url(#above)" transform="rotate(-18 16 16)"/>

  <!-- Tiny cyan "AI pulse" dot (top-right) -->
  <circle cx="23.5" cy="8.5" r="2"   fill="#164e63" opacity="0.9"/>
  <circle cx="23.5" cy="8.5" r="1.1" fill="#06b6d4" opacity="1"/>
  <circle cx="23.5" cy="8.5" r="0.5" fill="white"   opacity="1"/>
</svg>
